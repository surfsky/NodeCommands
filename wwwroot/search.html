<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-950 text-gray-100">
  <main class="h-full p-4 sm:p-5">
    <section class="h-full min-h-0 bg-gray-900 border border-gray-800 rounded-lg p-4 sm:p-5 flex flex-col">
      <p class="text-sm text-gray-400 mb-4">调用 search.js 递归查找文本（支持多关键字）。</p>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 mb-4">
        <div>
          <label class="text-xs text-gray-400">搜索目录</label>
          <div class="mt-1 flex items-center gap-2">
            <button id="pick-dir-btn"
              class="shrink-0 inline-flex items-center gap-1 bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-2.5 py-2 rounded-lg transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
              </svg>
              选择目录
            </button>
            <input id="dir" type="text" value="./data" placeholder="例如 ./data" title="搜索目录"
              class="w-full bg-gray-800 border border-gray-700 text-gray-100 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500" />
          </div>
          <p id="dir-tip" class="mt-1 text-[11px] text-gray-500"></p>
        </div>
        <div class="lg:col-span-2">
          <label class="text-xs text-gray-400">关键字（每行一个）</label>
          <textarea id="queries" rows="3" placeholder="例如:\n整改\n安全"
            class="mt-1 w-full bg-gray-800 border border-gray-700 text-gray-100 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500"></textarea>
        </div>
      </div>

      <div class="flex items-center gap-3 mb-3">
        <button id="run-btn"
          class="flex items-center gap-2 bg-emerald-700 hover:bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/>
          </svg>
          开始搜索
        </button>
        <span id="api-tip" class="text-xs text-gray-500 font-mono"></span>
      </div>

      <terminal-console id="console" title="search.js output"></terminal-console>
    </section>
  </main>

  <script src="./components.js"></script>
  <script>
    const dirEl = document.getElementById('dir');
    const pickDirBtn = document.getElementById('pick-dir-btn');
    const dirTipEl = document.getElementById('dir-tip');
    const queriesEl = document.getElementById('queries');
    const runBtn = document.getElementById('run-btn');
    const apiTipEl = document.getElementById('api-tip');
    const terminal = document.getElementById('console');

    runBtn.addEventListener('click', runSearch);
    pickDirBtn.addEventListener('click', pickDir);

    async function pickDir() {
      try {
        const response = await fetch('/api/pick-directory', { method: 'POST' });
        const result = await response.json();

        if (!response.ok) {
          dirTipEl.textContent = result.error || '目录选择失败';
          dirTipEl.classList.add('text-amber-400');
          return;
        }

        if (!result.ok && result.canceled) {
          return;
        }

        if (!result.ok) {
          dirTipEl.textContent = result.error || '目录选择失败';
          dirTipEl.classList.add('text-amber-400');
          return;
        }

        dirEl.value = result.path;
        dirTipEl.textContent = `已选择目录：${result.path}`;
        dirTipEl.classList.remove('text-amber-400');
      } catch (error) {
        dirTipEl.textContent = `目录选择失败：${error.message}`;
        dirTipEl.classList.add('text-amber-400');
      }
    }

    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        apiTipEl.textContent = `API OK | port: ${data.port}`;
      } catch (_error) {
        apiTipEl.textContent = 'API 未连接：请先运行 npm start';
        apiTipEl.classList.add('text-amber-400');
      }
    }

    async function runSearch() {
      const dir = dirEl.value.trim() || '.';
      const queries = queriesEl.value.split('\n').map((v) => v.trim()).filter(Boolean);
      if (!queries.length) {
        alert('请至少输入一个关键字。');
        return;
      }

      terminal.clear();
      terminal.hideStats();
      terminal.setLoading(true);
      const t0 = performance.now();

      try {
        const response = await fetch('/api/search/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir, queries })
        });

        if (!response.ok) {
          const err = await response.text();
          terminal.setOutput(`执行失败\n\n${err}`);
          terminal.showStats(0, 0, Math.round(performance.now() - t0));
          terminal.setLoading(false);
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          terminal.appendOutput(decoder.decode(value, { stream: true }));
        }

        terminal.showStats(0, 0, Math.round(performance.now() - t0));
      } catch (error) {
        terminal.setOutput(`请求失败\n\n${error.message}`);
        terminal.showStats(0, 0, Math.round(performance.now() - t0));
      }

      terminal.setLoading(false);
    }

    queriesEl.value = '整改';
    checkHealth();
  </script>
</body>
</html>
