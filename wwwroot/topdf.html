<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToPdf</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'] }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-gray-950 text-gray-100">
  <main class="h-full p-4 sm:p-5">
    <section class="h-full min-h-0 bg-gray-900 border border-gray-800 rounded-lg p-4 sm:p-5 flex flex-col">
      <p class="text-sm text-gray-400 mb-4">调用本地 Node 脚本 toPdf.js。路径使用表格维护，可选择多条参与执行。</p>

      <div class="mb-3 rounded-lg border border-gray-800 overflow-hidden">
        <div class="px-3 py-2 bg-gray-850 bg-gray-800/60 border-b border-gray-800 flex items-center justify-between">
          <span class="text-xs text-gray-400">输入路径列表</span>
          <div class="flex items-center gap-2">
            <button id="pick-dir-row-btn" class="text-xs px-2 py-1 rounded border border-gray-700 text-gray-300 hover:text-white hover:border-gray-500">选目录加入</button>
            <button id="pick-file-row-btn" class="text-xs px-2 py-1 rounded border border-gray-700 text-gray-300 hover:text-white hover:border-gray-500">选文件加入</button>
            <button id="pick-files-row-btn" class="text-xs px-2 py-1 rounded border border-gray-700 text-gray-300 hover:text-white hover:border-gray-500">选多文件加入</button>
            <button id="add-row-btn" class="text-xs px-2 py-1 rounded border border-gray-700 text-gray-300 hover:text-white hover:border-gray-500">新增行</button>
            <button id="remove-selected-btn" class="text-xs px-2 py-1 rounded border border-gray-700 text-gray-300 hover:text-white hover:border-gray-500">移除选中</button>
          </div>
        </div>
        <div class="overflow-auto max-h-48">
          <table class="w-full text-sm">
            <thead class="bg-gray-900 sticky top-0">
              <tr class="text-gray-400 border-b border-gray-800">
                <th class="w-16 text-left px-3 py-2">启用</th>
                <th class="text-left px-3 py-2">路径（文件或目录）</th>
                <th class="w-20 text-left px-3 py-2">操作</th>
              </tr>
            </thead>
            <tbody id="paths-body"></tbody>
          </table>
        </div>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-2 gap-3 mb-4">
        <div>
          <label class="text-xs text-gray-400">输出目录（可选）</label>
          <div class="mt-1 flex items-center gap-2">
            <input id="outdir" type="text" placeholder="./output_pdfs"
              class="w-full bg-gray-800 border border-gray-700 text-gray-100 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
            <button id="pick-outdir-btn" class="shrink-0 text-xs px-2 py-2 rounded border border-gray-700 text-gray-300 hover:text-white hover:border-gray-500">选择目录</button>
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-400">LibreOffice 路径（可选）</label>
          <input id="libreoffice" type="text" placeholder="/Applications/LibreOffice.app/Contents/MacOS/soffice"
            class="mt-1 w-full bg-gray-800 border border-gray-700 text-gray-100 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        </div>
      </div>

      <div class="flex items-center gap-3 mb-3">
        <button id="run-btn"
          class="flex items-center gap-2 bg-emerald-700 hover:bg-emerald-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/>
          </svg>
          执行转换
        </button>
        <span id="api-tip" class="text-xs text-gray-500 font-mono"></span>
      </div>

      <terminal-console id="console" title="toPdf.js output"></terminal-console>
    </section>
  </main>

  <script src="./components.js"></script>
  <script>
    const runBtn = document.getElementById('run-btn');
    const pickDirRowBtn = document.getElementById('pick-dir-row-btn');
    const pickFileRowBtn = document.getElementById('pick-file-row-btn');
    const pickFilesRowBtn = document.getElementById('pick-files-row-btn');
    const addRowBtn = document.getElementById('add-row-btn');
    const removeSelectedBtn = document.getElementById('remove-selected-btn');
    const pathsBody = document.getElementById('paths-body');
    const outdirEl = document.getElementById('outdir');
    const pickOutdirBtn = document.getElementById('pick-outdir-btn');
    const libreofficeEl = document.getElementById('libreoffice');
    const apiTipEl = document.getElementById('api-tip');
    const terminal = document.getElementById('console');

    runBtn.addEventListener('click', runToPdf);
    pickDirRowBtn.addEventListener('click', async () => {
      const picked = await requestPick('/api/pick-directory');
      if (picked) addPathRow(picked);
    });
    pickFileRowBtn.addEventListener('click', async () => {
      const picked = await requestPick('/api/pick-file');
      if (picked) addPathRow(picked);
    });
    pickFilesRowBtn.addEventListener('click', async () => {
      const picked = await requestPick('/api/pick-files');
      if (picked && Array.isArray(picked)) {
        picked.forEach((p) => addPathRow(p));
      }
    });
    addRowBtn.addEventListener('click', () => addPathRow(''));
    removeSelectedBtn.addEventListener('click', removeSelectedRows);
    pickOutdirBtn.addEventListener('click', async () => {
      const picked = await requestPick('/api/pick-directory');
      if (picked) outdirEl.value = picked;
    });

    async function requestPick(endpoint) {
      try {
        const response = await fetch(endpoint, { method: 'POST' });
        const result = await response.json();

        if (!response.ok) {
          alert(result.error || '选择失败');
          return null;
        }

        if (!result.ok && result.canceled) return null;
        if (!result.ok) {
          alert(result.error || '选择失败');
          return null;
        }

        if (endpoint === '/api/pick-files') {
          return result.paths || [];
        }

        return result.path;
      } catch (error) {
        alert(`选择失败: ${error.message}`);
        return null;
      }
    }

    function addPathRow(path) {
      const tr = document.createElement('tr');
      tr.className = 'border-b border-gray-800/80';
      tr.innerHTML = `
        <td class="px-3 py-2 align-top">
          <input type="checkbox" class="row-enabled w-4 h-4 accent-emerald-500" checked />
        </td>
        <td class="px-3 py-2">
          <input type="text" value="${path.replace(/"/g, '&quot;')}" placeholder="例如 ./data 或 ./a.docx"
            class="row-path w-full bg-gray-800 border border-gray-700 text-gray-100 text-sm rounded px-2 py-1.5 focus:outline-none focus:border-indigo-500" />
        </td>
        <td class="px-3 py-2 align-top">
          <button class="row-remove text-xs px-2 py-1 rounded border border-gray-700 text-gray-300 hover:text-white hover:border-gray-500">删除</button>
        </td>
      `;
      tr.querySelector('.row-remove').addEventListener('click', () => tr.remove());
      pathsBody.appendChild(tr);
    }

    function removeSelectedRows() {
      const rows = Array.from(pathsBody.querySelectorAll('tr'));
      rows.forEach((row) => {
        const enabled = row.querySelector('.row-enabled');
        if (enabled && enabled.checked) row.remove();
      });
      if (!pathsBody.children.length) addPathRow('');
    }

    function getSelectedPaths() {
      const rows = Array.from(pathsBody.querySelectorAll('tr'));
      return rows
        .filter((row) => row.querySelector('.row-enabled')?.checked)
        .map((row) => row.querySelector('.row-path')?.value?.trim() || '')
        .filter(Boolean);
    }

    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        if (!res.ok) throw new Error('API unavailable');
        const data = await res.json();
        apiTipEl.textContent = `API OK | cwd: ${data.cwd}`;
      } catch (_error) {
        apiTipEl.textContent = 'API 未连接：请先运行 node server/app.js';
        apiTipEl.classList.add('text-amber-400');
      }
    }

    async function runToPdf() {
      const inputs = getSelectedPaths();

      if (inputs.length === 0) {
        alert('请至少启用一条有效路径。');
        return;
      }

      terminal.clear();
      terminal.hideStats();
      terminal.setLoading(true);

      const t0 = performance.now();
      try {
        const response = await fetch('/api/topdf/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            inputs,
            outdir: outdirEl.value.trim(),
            libreoffice: libreofficeEl.value.trim()
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          terminal.setOutput(`执行失败\n\n${errorText}`);
          terminal.showStats(0, 0, Math.round(performance.now() - t0));
          terminal.setLoading(false);
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          terminal.appendOutput(decoder.decode(value, { stream: true }));
        }

        terminal.showStats(0, 0, Math.round(performance.now() - t0));
      } catch (error) {
        terminal.setOutput(`请求失败\n\n${error.message}`);
        terminal.showStats(0, 0, Math.round(performance.now() - t0));
      }

      terminal.setLoading(false);
    }

    addPathRow('./data');
    addPathRow('');
    checkHealth();
  </script>
</body>
</html>
